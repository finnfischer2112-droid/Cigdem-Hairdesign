kind = "web"
previewPath = "/"
title = "Hairdesign Cigdem"
version = "1.0.0"
id = "artifacts/hairdesign-cigdem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20943
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hairdesign-cigdem run dev"

[services.env]
PORT = "20943"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hairdesign-cigdem", "run", "build"]
publicDir = "artifacts/hairdesign-cigdem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
